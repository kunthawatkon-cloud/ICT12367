{% extends "base.html" %}

{% block title %}
<title>แบบฟอร์มบันทึกข้อมูลประชากร</title>
{% endblock %}

{% block content %}

<div class="form-box">
    <div class="form-header">
        แบบฟอร์มบันทึกข้อมูลประชากร
    </div>

    <div class="form-body">
        <form>
            <label for="fullname">ชื่อประชากร</label>
            <input type="text" id="fullname" placeholder="กรุณากรอกชื่อ-นามสกุล">

            <label for="age">อายุ</label>
            <input type="number" id="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">

            <div class="btn-group">
                <button type="submit" class="btn btn-save">ลงทะเบียน</button>
                <button type="reset" class="btn btn-reset">ล้างข้อมูล</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
