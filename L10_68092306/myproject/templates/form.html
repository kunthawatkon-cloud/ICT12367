{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ฟอร์ม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .hero-banner {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .banner-wrap {
            position: relative;
        }

        .banner-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
        }

        .form-card {
            width: 400px;
            margin: 30px auto;
        }

        .btn-pink {
            background-color: hotpink;
            color: white;
        }

        .btn-orange {
            background-color: orange;
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <div class="banner-wrap">
        <img src="{% static 'images/banner.jpg' %}" class="hero-banner">
        <div class="banner-text">
            ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367
        </div>
    </div>

    <div class="card form-card shadow">
        <div class="card-header bg-primary text-white text-center">
            แบบฟอร์มบันทึกข้อมูลประชากร
        </div>

        <div class="card-body">
            <form method="post" action="/form/">
                {% csrf_token %}

                <div class="mb-3">
                    <label>ชื่อประชากร</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>อายุ</label>
                    <input type="number" name="age" class="form-control" required>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-pink">ลงทะเบียน</button>
                    <button type="reset" class="btn btn-orange">ล้างข้อมูล</button>
                </div>

            </form>
        </div>
    </div>

</div>

</body>
</html>
