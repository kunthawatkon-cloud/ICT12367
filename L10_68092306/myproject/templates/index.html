{% load static %}

<div class="text-center mb-4">
    <img src="{% static 'images/banner.jpg' %}" class="img-fluid">
</div>
<div class="container mb-5">
    <div class="card mx-auto" style="max-width:500px;">
        <div class="card-header bg-primary text-white text-center">
            แบบฟอร์มบันทึกข้อมูลประชากร
        </div>

        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">ชื่อประชากร</label>
                    <input type="text" name="name" class="form-control" placeholder="กรอกชื่อ">
                </div>

                <div class="mb-3">
                    <label class="form-label">อายุ</label>
                    <input type="number" name="age" class="form-control" placeholder="กรอกอายุ">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-success">ลงทะเบียน</button>
                    <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                </div>

            </form>
        </div>
    </div>
</div>
