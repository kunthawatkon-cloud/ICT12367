{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อมูลประชากร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .hero-banner {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .banner-wrap {
            position: relative;
        }

        .banner-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 26px;
            text-shadow: 2px 2px 5px black;
        }

        .btn-edit {
            background-color: hotpink;
            color: white;
        }

        .btn-delete {
            background-color: orange;
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <div class="banner-wrap">
        <img src="{% static 'images/banner.jpg' %}" class="hero-banner">
        <div class="banner-text">
            ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367
        </div>
    </div>

    <div class="mt-3 d-flex justify-content-between align-items-center">
        <h3 style="color: blueviolet;">ยินดีต้อนรับเข้าสู่ประชากร</h3>
        <a href="/form/" class="btn btn-primary">+ เพิ่มข้อมูล</a>
    </div>

    <table class="table table-hover mt-3">
        <thead>
            <tr>
                <th>รหัส</th>
                <th>ชื่อ</th>
                <th>อายุ</th>
                <th class="text-center">แก้ไข</th>
                <th class="text-center">ลบ</th>
            </tr>
        </thead>
        <tbody>
            {% for person in all_person %}
            <tr>
                <td>{{ person.id }}</td>
                <td>{{ person.name }}</td>
                <td>{{ person.age }}</td>
                <td class="text-center">
                    <a href="#" class="btn btn-edit">แก้ไข</a>
                </td>
                <td class="text-center">
                    <a href="#" class="btn btn-delete">ลบ</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
