<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Employee Form</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f2f2f2;margin:0;padding:40px}
    .card{max-width:420px;margin:0 auto;background:#fff;border-radius:10px;padding:24px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
    h2{text-align:center;margin:0 0 18px}
    label{display:block;margin:12px 0 6px;font-weight:600}
    input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
    button{width:100%;margin-top:18px;padding:12px;border:none;border-radius:6px;background:#1f9d55;color:#fff;font-size:16px;cursor:pointer}
    button:hover{opacity:.95}
  </style>
</head>
<body>
  <div class="card">
    <h2>บันทึกข้อมูลพนักงาน</h2>

    <form>
      <label>Full Name</label>
      <input type="text" placeholder="Full Name">

      <label>Email</label>
      <input type="email" placeholder="Email">

      <label>Position</label>
      <select>
        <option>Manager</option>
        <option>Staff</option>
        <option>Intern</option>
      </select>

      <label>Phone Number</label>
      <input type="text" placeholder="Phone Number">

      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
